<!DOCTYPE html>
<html>
<head>
  <title>AI WORKOUT UNLOCKER</title>
  <style>
    body { background: #111; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 30px; }
    h1 { color: #ff3333; margin: 10px 0; font-size: 2.2rem; }
    p { font-size: 1.1rem; color: #aaa; margin: 15px 0; line-height: 1.5; }
    
    /* Interactive Selection Dropdown for Mac Testing Only */
    .test-menu { margin: 20px 0; }
    select { padding: 12px 25px; font-size: 1.1rem; background: #222; color: #fff; border: 2px solid #ff3333; border-radius: 8px; cursor: pointer; font-weight: bold; }
    
    .display-metrics { font-size: 6rem; font-weight: bold; margin: 20px 0; color: #ffcc00; }
    .status-box { font-size: 1.3rem; margin: 25px auto; font-weight: bold; padding: 18px; border-radius: 8px; max-width: 450px; background: #007bff; box-shadow: 0 0 15px #007bff; }
    
    .instruction-card { background: #222; border: 2px solid #333; border-radius: 10px; padding: 20px; max-width: 500px; margin: 20px auto; text-align: left; }
    .mac-hint { color: #007bff; font-weight: bold; text-align: center; margin-top: 15px; font-size: 1.2rem; }
  </style>
</head>
<body>

  <h1>WORKOUT PENALTY MANDATE</h1>
  
  <div class="test-menu" id="macDropdownContainer">
    <label for="testExerciseSelect"><b>SELECT TEST EXERCISE:</b> </label>
    <select id="testExerciseSelect" onchange="setupMacTargetGoal()">
      <option value="squats">Squats (15 Reps)</option>
      <option value="pushups">Pushups (10 Reps)</option>
      <option value="jacks">Jumping Jacks (20 Reps)</option>
    </select>
  </div>

  <div class="display-metrics" id="trackerDisplay">0</div>
  <div id="status" class="status-box">⏳ SECURE MONITORING PIPELINE ACTIVE</div>
  
  <div class="instruction-card">
    <div class="mac-hint">💻 MAC TESTING SHORTCUT ACTIVATED</div>
    <p style="text-align: center; margin-top: 5px;">Press the <b>SPACEBAR</b> on your keyboard to manually simulate completing an exercise rep!</p>
  </div>

  <script>
    let currentReps = 0;
    let targetGoal = 15; // Defaults to squats goal

    const display = document.getElementById('trackerDisplay');
    const statusElement = document.getElementById('status');
    const selectMenu = document.getElementById('testExerciseSelect');

    // 1. Setup target boundaries based on what you select in the Mac dropdown
    function setupMacTargetGoal() {
      currentReps = 0;
      display.innerText = currentReps;
      statusElement.innerText = "⏳ SECURE MONITORING PIPELINE ACTIVE";
      statusElement.style.backgroundColor = "#007bff";
      statusElement.style.boxShadow = "0 0 15px #007bff";

      if (selectMenu.value === "squats") targetGoal = 15;
      if (selectMenu.value === "pushups") targetGoal = 10;
      if (selectMenu.value === "jacks") targetGoal = 20;
    }

    // 2. Keyboard Event Listener: Intercepts Spacebar clicks on your Mac
    window.addEventListener('keydown', (event) => {
      if (event.code === 'Space' || event.key === ' ') {
        event.preventDefault(); // Stop the webpage from scrolling down when pressing spacebar
        
        if (currentReps < targetGoal) {
          currentReps++;
          display.innerText = currentReps;
          
          // Check if you completed the workout goal
          if (currentReps >= targetGoal) {
            statusElement.innerText = "🏆 TARGET CLEARED! ACCESS RESTORED.";
            statusElement.style.backgroundColor = "#28a745";
            statusElement.style.boxShadow = "0 0 15px #28a745";
            
            setTimeout(() => {
              alert("🏆 SEVERITY EXERCISE CLEARANCE GRANTED! Device Unlocking.");
              window.location.href = "https://youtube.com";
            }, 300);
          }
        }
      }
    });

    // Initialize default target values
    setupMacTargetGoal();
  </script>
</body>
</html>
