<!DOCTYPE html>
<html>
<head>
  <title>PHYSICS PLANK LOCKOUT</title>
  <style>
    body { background: #111; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 40px; }
    h1 { color: #ff3333; margin: 10px 0; font-size: 2rem; }
    p { font-size: 1.1rem; color: #aaa; margin: 15px 0; }
    .timer { font-size: 6rem; font-weight: bold; margin: 30px 0; color: #ffcc00; }
    .status-box { font-size: 1.4rem; margin: 25px auto; font-weight: bold; padding: 20px; border-radius: 8px; max-width: 400px; }
    .planking { background: #28a745; color: white; box-shadow: 0 0 20px #28a745; }
    .cheating { background: #dc3545; color: white; box-shadow: 0 0 20px #dc3545; }
    .start-btn { padding: 20px 40px; font-size: 1.5rem; background: #007bff; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <h1>HARD FLOOR PLANK VERIFICATION</h1>
  <p>This page uses your phone's physics chip. Place your phone <b>flat on the solid floor</b> (wood/tile) directly underneath your chest.</p>
  
  <div class="timer" id="time">01:00</div>
  
  <button id="activateBtn" class="start-btn" onclick="requestSensorPermissions()">START PHYSICS CHECKER</button>
  <div id="status" class="status-box cheating" style="display:none;">⏳ CALIBRATING SENSORS...</div>

  <script>
    let timeLeft = 60;
    let timerInterval = null;
    let isPhoneFlat = false;
    let isSurfaceSolid = false;
    
    const statusElement = document.getElementById('status');
    const timerElement = document.getElementById('time');
    const activateBtn = document.getElementById('activateBtn');

    // 1. Request Hardware Motion Permissions (Required by modern browsers)
    function requestSensorPermissions() {
      if (typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission()
          .then(permissionState => {
            if (permissionState === 'granted') { startSensors(); }
          }).catch(console.error);
      } else {
        startSensors(); // Works automatically on standard Android Chrome
      }
    }

    function startSensors() {
      activateBtn.style.display = "none";
      statusElement.style.display = "block";

      // 2. TILT CHECK: Ensure phone is flat on its back
      window.addEventListener('deviceorientation', (event) => {
        let beta = Math.abs(event.beta);
        let gamma = Math.abs(event.gamma);
        isPhoneFlat = (beta < 10 && gamma < 10);
      });

      // 3. MATTRESS DETECTION: Measures micro-vibrations and floor absorption frequencies
      window.addEventListener('devicemotion', (event) => {
        let acc = event.acceleration; // Acceleration excluding gravity
        if (!acc) return;

        // Calculate total 3D physics movement value
        let movement = Math.sqrt(acc.x * acc.x + acc.y * acc.y + acc.z * acc.z);

        // Physics Logic:
        // A bed acts like a giant shock absorber—when your head shakes on a bed, the mattress 
        // creates slow, damp, bouncy vibrations (movement score waves around 0.05 to 0.3).
        // A hardwood/tile floor absorbs everything. When you drop down onto a solid floor,
        // it stays perfectly rigid (movement score sits at structural absolute zero: < 0.02).
        if (movement > 0.001 && movement < 0.035) {
          isSurfaceSolid = true; // The phone is resting on a completely unyielding solid floor surface
        } else {
          isSurfaceSolid = false; // Tilted, picked up, or sitting on a soft bouncy mattress/bed
        }

        // Live Master Status Evaluator
        if (!isPhoneFlat) {
          updateStatus(false, "⚠️ PHONE MUST BE LYING FLAT ON THE FLOOR!");
        } else if (!isSurfaceSolid) {
          updateStatus(false, "🛏️ SOFT SURFACE DETECTED! PLACE ON SOLID HARDWOOD/TILE FLOOR!");
        } else {
          updateStatus(true, "✅ SOLID FLOOR DETECTED! PLANKING RUNNING!");
        }
      });

      runExerciseTimer();
    }

    function updateStatus(valid, message) {
      statusElement.innerText = message;
      statusElement.className = `status-box ${valid ? 'planking' : 'cheating'}`;
    }

    function runExerciseTimer() {
      timerInterval = setInterval(() => {
        // BOTH physics boundaries must pass to tick down the time
        if (isPhoneFlat && isSurfaceSolid && timeLeft > 0) {
          timeLeft--;
          let mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
          let secs = (timeLeft % 60).toString().padStart(2, '0');
          timerElement.innerText = `${mins}:${secs}`;
          
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            alert("🏆 STRUCTURAL PLANK VERIFIED! App lock lifted.");
            window.location.href = "https://youtube.com";
          }
        }
      }, 1000);
    }
  </script>
</body>
</html>
