<!DOCTYPE html>
<html>
<head>
  <title>DROP AND PLANK!</title>
  <!-- Load the Google AI Pose Estimation Scripts -->
  <script src="https://jsdelivr.net" crossorigin="anonymous"></script>
  <script src="https://jsdelivr.net" crossorigin="anonymous"></script>
  <style>
    body { background: #111; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
    h1 { color: #ff3333; margin: 10px 0; }
    .timer { font-size: 5rem; font-weight: bold; margin: 10px 0; color: #ffcc00; }
    #videoContainer { position: relative; width: 320px; height: 240px; margin: 0 auto; border: 4px solid #ff3333; border-radius: 10px; overflow: hidden; }
    video { width: 100%; height: 100%; transform: scaleX(-1); background: #222; }
    .status-box { font-size: 1.5rem; margin: 15px; font-weight: bold; padding: 10px; border-radius: 5px; }
    .planking { background: #28a745; color: white; }
    .cheating { background: #dc3545; color: white; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>

  <h1>DOOMSCROLLING LOCKED</h1>
  <p>Hold a straight plank in front of the camera to unlock your device.</p>
  
  <div class="timer" id="time">01:00</div>
  <div id="videoContainer"><video id="webcam" autoplay playsinline></video></div>
  <div id="status" class="status-box cheating">CAMERA STARTING...</div>

  <script>
    let timeLeft = 60;
    let isPlankingCorrectly = false;
    const videoElement = document.getElementById('webcam');
    const statusElement = document.getElementById('status');
    const timerElement = document.getElementById('time');

    // Setup MediaPipe Pose AI
    const pose = new Pose({
      locateFile: (file) => `https://jsdelivr.net{file}`
    });

    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults(onPoseResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await pose.send({ image: videoElement }); },
      width: 320, height: 240
    });
    camera.start();

    // AI Math: Checks if your shoulder, hip, and ankle are in a straight parallel line
    function onPoseResults(results) {
      if (!results.poseLandmarks) {
        updatePlankStatus(false, "NO BODY DETECTED");
        return;
      }

      // Grab body joints (Shoulder, Hip, Knee)
      const shoulder = results.poseLandmarks[11]; // Left shoulder
      const hip = results.poseLandmarks[23];      // Left hip
      const knee = results.poseLandmarks[25];     // Left knee

      // Simple AI angle check: Are your hips sagging down or sticking up in the air?
      const hipAngle = Math.abs((Math.atan2(knee.y - hip.y, knee.x - hip.x) - Math.atan2(shoulder.y - hip.y, shoulder.x - hip.x)) * (180 / Math.PI));
      
      // A perfect plank angle is roughly between 165 and 180 degrees (straight line)
      if (hipAngle >= 160 && hipAngle <= 185) {
        updatePlankStatus(true, "✅ PERFECT PLANK! HOLD IT!");
      } else {
        updatePlankStatus(false, "❌ FIX YOUR FORM! FLAT BODY!");
      }
    }

    function updatePlankStatus(valid, message) {
      isPlankingCorrectly = valid;
      statusElement.innerText = message;
      statusElement.className = `status-box ${valid ? 'planking' : 'cheating'}`;
    }

    // This loop ticks down ONLY if the AI proves you are actually planking
    setInterval(() => {
      if (isPlankingCorrectly && timeLeft > 0) {
        timeLeft--;
        let mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        let secs = (timeLeft % 60).toString().padStart(2, '0');
        timerElement.innerText = `${mins}:${secs}`;

        if (timeLeft <= 0) {
          alert("Plank complete! Device unlocked.");
          // Instantly open YouTube back up cleanly
          window.location.href = "https://youtube.com";
        }
      }
    }, 1000);
  </script>
</body>
</html>
