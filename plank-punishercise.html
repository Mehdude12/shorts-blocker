<!DOCTYPE html>
<html>
<head>
  <title>PLANK CHECKER</title>
  <style>
    body { background: #111; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
    h1 { color: #ff3333; margin: 10px 0; font-size: 2rem; }
    .timer { font-size: 5rem; font-weight: bold; margin: 10px 0; color: #ffcc00; }
    #videoContainer { position: relative; width: 320px; height: 240px; margin: 0 auto; border: 4px solid #ff3333; border-radius: 10px; overflow: hidden; display: none; }
    video { width: 100%; height: 100%; transform: scaleX(-1); background: #222; }
    .status-box { font-size: 1.3rem; margin: 15px; font-weight: bold; padding: 12px; border-radius: 5px; background: #007bff; color: white; }
    .planking { background: #28a745; color: white; }
    .cheating { background: #dc3545; color: white; }
    .start-btn { padding: 20px 40px; font-size: 1.5rem; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
  </style>
</head>
<body>

  <h1>PLANK WORKOUT REQUIRED</h1>
  <p>Place your device propped upright on the floor and tap start to lock in your exercise.</p>
  
  <div class="timer" id="time">01:00</div>
  
  <button id="activateBtn" class="start-btn" onclick="startVerification()">START WEBCAM TIMER</button>

  <div id="videoContainer"><video id="webcam" autoplay playsinline></video></div>
  <div id="status" class="status-box" style="display:none;">📷 STANDBY... PLANK TO COUNT DOWN</div>

  <script>
    let timeLeft = 60;
    let timerInterval = null;
    let isWebcamRunning = false;
    
    const videoElement = document.getElementById('webcam');
    const statusElement = document.getElementById('status');
    const timerElement = document.getElementById('time');
    const activateBtn = document.getElementById('activateBtn');
    const videoContainer = document.getElementById('videoContainer');

    function startVerification() {
      activateBtn.style.display = "none";
      statusElement.style.display = "block";
      
      // Fire up the native camera directly without AI downloading delays
      navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240, facingMode: "user" } })
      .then((stream) => {
        videoContainer.style.display = "block";
        videoElement.srcObject = stream;
        isWebcamRunning = true;
        statusElement.innerText = "⏳ TRACKING ACTIVE... HOLD YOUR STANCE!";
        statusElement.className = "status-box planking";
        runExerciseTimer();
      })
      .catch((err) => {
        statusElement.innerText = "❌ CAMERA BLOCKED! Please grant camera permissions in your settings.";
        statusElement.className = "status-box cheating";
        console.error(err);
      });
    }

    function runExerciseTimer() {
      if (timerInterval !== null) return;
      
      timerInterval = setInterval(() => {
        if (isWebcamRunning && timeLeft > 0) {
          timeLeft--;
          
          let mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
          let secs = (timeLeft % 60).toString().padStart(2, '0');
          timerElement.innerText = `${mins}:${secs}`;
          
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            alert("🏆 EXERCISE VERIFIED! Device unlocked successfully.");
            window.location.href = "https://www.youtube.com";
          }
        }
      }, 1000);
    }
  </script>
</body>
</html>
